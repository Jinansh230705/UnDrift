name: Build and Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/build.gradle.kts' # Prevents infinite build loops from the version bump commit
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release Channel (e.g. stable, beta, alpha, weekly, nightly)'
        required: false
        default: 'stable'

env:
  RELEASE_CHANNEL: ${{ github.event.inputs.channel || 'stable' }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push version bump and create releases
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to generate accurate release notes from history
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bump Version with Release Channel
        id: bump
        run: |
          cat << 'EOF' > bump.py
          import re
          import os

          channel = os.environ.get('RELEASE_CHANNEL', 'stable').strip()

          with open('app/build.gradle.kts', 'r') as f: 
              content = f.read()
              
          c_match = re.search(r'versionCode\s*=\s*(\d+)', content)
          n_match = re.search(r'versionName\s*=\s*"([^"]+)"', content)
          
          if c_match and n_match:
              new_code = int(c_match.group(1)) + 1
              raw_name = n_match.group(1)
              
              # Strip existing channel suffix if present (e.g. 1.0.6-stable -> 1.0.6)
              base_ver = raw_name.split('-')[0]
              parts = base_ver.split('.')
              
              if len(parts) >= 3: 
                  parts[2] = str(int(parts[2]) + 1)
                  base_new = '.'.join(parts)
              else:
                  base_new = base_ver + ".1"
              
              new_name = f"{base_new}-{channel}" if channel else base_new
              
              content = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {new_code}', content)
              content = re.sub(r'versionName\s*=\s*"[^"]+"', f'versionName = "{new_name}"', content)
              
              with open('app/build.gradle.kts', 'w') as f: 
                  f.write(content)
                  
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  print(f"NEW_VERSION={new_name}", file=fh)
                  print(f"NEW_VERSION_CODE={new_code}", file=fh)
          EOF
          python3 bump.py
          rm bump.py

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to v${{ steps.bump.outputs.NEW_VERSION }} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin master
          git push

      - name: Generate Detailed Changelog
        id: changelog
        run: |
          cat << 'EOF' > generate_notes.py
          import subprocess
          import os
          import re

          # Try to get previous tag
          try:
              tags = subprocess.check_output(["git", "tag", "-l", "v*"], text=True).strip().split('\n')
              tags = [t for t in tags if t]
              prev_tag = tags[-1] if tags else None
          except Exception:
              prev_tag = None

          if prev_tag:
              log_range = f"{prev_tag}..HEAD"
          else:
              log_range = "HEAD~15..HEAD"

          try:
              raw_log = subprocess.check_output(["git", "log", log_range, "--no-merges", "--pretty=format:%h|%s"], text=True).strip().split('\n')
          except Exception:
              raw_log = []

          features = []
          fixes = []
          maintenance = []
          other = []

          for line in raw_log:
              if not line or '|' not in line:
                  continue
              h, s = line.split('|', 1)
              
              # Skip automated bump commits
              if "skip ci" in s.lower() or "bump version" in s.lower():
                  continue
              
              entry = f"- {s} (`{h}`)"
              if re.match(r'^(feat|feature)', s, re.I):
                  features.append(entry)
              elif re.match(r'^(fix|bug|sec|security)', s, re.I):
                  fixes.append(entry)
              elif re.match(r'^(chore|ci|refactor|docs|style|perf)', s, re.I):
                  maintenance.append(entry)
              else:
                  other.append(entry)

          sections = []
          if features:
              sections.append("### 🚀 Features & Enhancements\n" + "\n".join(features))
          if fixes:
              sections.append("### 🐛 Bug Fixes & Security Hardening\n" + "\n".join(fixes))
          if maintenance:
              sections.append("### 🛠 Maintenance & Performance\n" + "\n".join(maintenance))
          if other:
              sections.append("### 📦 Other Changes\n" + "\n".join(other))

          if not sections:
              sections.append("### 📋 Changes in this Release\n- General performance and stability improvements.")

          notes = "\n\n".join(sections)
          with open("RELEASE_NOTES.md", "w", encoding="utf-8") as f:
              f.write(notes)
          EOF
          python3 generate_notes.py
          rm generate_notes.py

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Signed APK
        run: ./gradlew assembleDebug

      - name: Publish GitHub Release with Custom Notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.NEW_VERSION }}
          name: Release v${{ steps.bump.outputs.NEW_VERSION }}
          body_path: RELEASE_NOTES.md
          files: app/build/outputs/apk/debug/app-debug.apk
